<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>真島のAI練習サイト</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #bbdefb, #e3f2fd, #fce4ec, #f8bbd0);
      font-family: "Hiragino Maru Gothic Pro", "BIZ UDPGothic", sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(180, 120, 160, 0.2);
      max-width: 640px;
      width: 90%;
    }

    h1 {
      font-size: 3.8rem;
      color: #001f5b;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.1rem;
      color: #7b4f7b;
      line-height: 1.8;
      margin-top: 12px;
    }

    .badge {
      display: inline-block;
      margin-top: 28px;
      padding: 8px 20px;
      background: linear-gradient(90deg, #f48fb1, #ce93d8);
      color: white;
      border-radius: 999px;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AIと歩む真島の新時代</h1>
    <p>このサイトはGitとClaudeで管理されています</p>
    <p>ここは真島がAIを使いながら<br>Web制作を練習するためのサイトです。</p>
    <p>少しずつ、一歩ずつ。</p>
    <span class="badge">Powered by Claude Code</span>
  </div>
</body>
</html>
